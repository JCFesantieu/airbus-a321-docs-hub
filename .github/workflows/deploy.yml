name: Deploy to Cloud Run (Secure WIF)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

env:
  PROJECT_ID: sre-sandbox-340015
  SERVICE: airbus-a321-docs
  REGION: europe-west1
  # The provider ID below is constructed from your project number and pool/provider names
  WIF_PROVIDER: 'projects/874417405692/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
  WIF_SERVICE_ACCOUNT: 'jcf-deploy@sre-sandbox-340015.iam.gserviceaccount.com'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth (WIF)
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Deploy to Cloud Run'
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --source . \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 1Gi \
            --quiet
